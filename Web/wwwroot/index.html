<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackingTasksOp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar sticky-top" id="mainNav">
        <div class="container-fluid px-4">
            <span class="navbar-brand fw-bold fs-5">
                <i class="bi bi-clock-history me-2 text-primary"></i>TrackingTasksOp
            </span>
            <div id="activeSessionBadge" class="d-none">
                <div class="badge bg-success d-flex align-items-center gap-2 px-3 py-2 rounded-pill">
                    <span class="pulse-dot"></span>
                    <span id="activeSessionName" class="text-truncate fw-normal" style="max-width:180px"></span>
                    <span class="fw-bold font-monospace ms-1" id="navTimer">00:00:00</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container-fluid px-4 py-4">

        <!-- Filter bar -->
        <div class="card mb-4 border-0 bg-body-secondary">
            <div class="card-body py-3">
                <div class="row g-3 align-items-end">
                    <div class="col-12 col-md-5">
                        <label class="form-label small text-muted mb-1">
                            <i class="bi bi-folder me-1"></i>Proyecto
                        </label>
                        <select id="projectSelect" class="form-select">
                            <option value="">Cargando proyectos...</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <button id="loadBtn" class="btn btn-primary px-4">
                            <i class="bi bi-search me-2"></i>Cargar tareas
                        </button>
                    </div>
                    <div class="col-auto ms-auto d-flex align-items-center gap-2">
                        <div id="loadingSpinner" class="d-none text-muted small">
                            <div class="spinner-border spinner-border-sm text-primary me-1" role="status"></div>
                            Cargando...
                        </div>
                        <span id="wpCount" class="badge bg-body-tertiary text-muted border d-none"></span>
                    </div>
                </div>

                <!-- Filtro por estado (aparece al cargar tareas) -->
                <div id="statusFilterSection" class="d-none pt-2 mt-1 border-top border-subtle">
                    <label class="form-label small text-muted mb-2">
                        <i class="bi bi-funnel me-1"></i>Estado
                    </label>
                    <div id="statusFilterPills" class="d-flex flex-wrap gap-2"></div>
                </div>

            </div>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="text-center py-5 text-muted">
            <i class="bi bi-inbox display-3 d-block mb-3 opacity-25"></i>
            <p class="mb-0">Selecciona un proyecto y haz clic en <strong>Cargar tareas</strong></p>
        </div>

        <!-- Error state -->
        <div id="errorState" class="d-none">
            <div class="alert alert-danger d-flex align-items-center gap-2">
                <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
                <span id="errorMsg"></span>
            </div>
        </div>

        <!-- Work packages grid -->
        <div id="wpGrid" class="row g-3"></div>

    </main>

    <!-- ── Modal: Finalizar sesión ── -->
    <div class="modal fade" id="endSessionModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <div>
                        <h5 class="modal-title">
                            <i class="bi bi-stop-circle text-danger me-2"></i>Finalizar sesión
                        </h5>
                        <p class="text-muted small mb-0 mt-1" id="modalTaskName"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="sessionSummaryBox" class="d-none alert alert-success d-flex align-items-center gap-2 mb-3 py-2">
                        <i class="bi bi-clock-fill flex-shrink-0"></i>
                        <span>Tiempo trabajado: <strong id="sessionDuration" class="font-monospace"></strong></span>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">
                            Actividad <span class="text-danger">*</span>
                        </label>
                        <select id="activitySelect" class="form-select" disabled>
                            <option value="">Cargando actividades...</option>
                        </select>
                    </div>
                    <div>
                        <label class="form-label fw-medium">
                            Comentario <span class="text-danger">*</span>
                        </label>
                        <textarea id="commentInput" class="form-control" rows="3"
                            placeholder="Describe brevemente el trabajo realizado..."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="confirmEndBtn" class="btn btn-danger px-4">
                        <i class="bi bi-stop-circle me-2"></i>Finalizar y registrar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Modal: Historial ── -->
    <div class="modal fade" id="historyModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <div>
                        <h5 class="modal-title">
                            <i class="bi bi-clock-history me-2 text-primary"></i>Historial de sesiones
                        </h5>
                        <p class="text-muted small mb-0 mt-1" id="historyTaskName"></p>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="historyBody">
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Bot Floating Button -->
    <a href="/bot.html" class="btn btn-primary rounded-circle shadow-lg d-flex align-items-center justify-content-center" 
       style="position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; z-index: 1050;">
        <i class="bi bi-robot fs-2"></i>
    </a>

    <!-- Toast container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
